<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Login</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-group { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; }
    </style>
</head>
<body>

    <h2>Đăng nhập hệ thống</h2>
    
    <div class="form-group">
        <label for="txtusername">Tên đăng nhập:</label>
        <input type="text" id="txtusername" name="txtusername">
    </div>

    <div class="form-group">
        <label for="txtmatkhau">Mật khẩu:</label>
        <input type="password" id="txtmatkhau" name="txtmatkhau">
    </div>

    <button type="button" onclick="handleLogin()">Đăng nhập</button>

    <script>
        function handleLogin() {
            // 1. Lấy giá trị từ các ô input
            const user = document.getElementById('txtusername').value;
            const pass = document.getElementById('txtmatkhau').value;

            // 2. Kiểm tra điều kiện (username=admin, password=admin)
            if (user === 'admin' && pass === 'admin') {
                alert('Đăng nhập thành công!');
                // 3. Chuyển hướng sang trang thành công
                // Bạn có thể thay đổi link bên dưới thành trang thực tế của bạn
                window.location.href = "success.html"; 
            } else {
                alert('Sai tên đăng nhập hoặc mật khẩu. Vui lòng thử lại!');
            }
        }
    </script>

</body>
</html>
